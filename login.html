<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理系統登入 - 桃子腳地圖專案</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 25%, #e8eaf6 50%, #e0f7fa 75%, #fff8e1 100%);
            min-height: 100vh;
        }
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 100px);
            padding: 20px;
            margin-top: 100px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .login-logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .login-logo-area img {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }
        .login-title-main {
            font-size: 22px;
            font-weight: 800;
            color: #b71c1c;
            letter-spacing: 0.5px;
        }
        .login-title-sub {
            font-size: 14px;
            font-weight: 600;
            color: #718093;
            margin-bottom: 24px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 14px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            background: rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }
        input:focus {
            border-color: #b71c1c;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(183, 28, 28, 0.08);
        }
        button {
            width: 100%;
            padding: 14px;
            background: #b71c1c;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(183, 28, 28, 0.2);
        }
        button:hover {
            background: #c52020;
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(183, 28, 28, 0.3);
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-container">
            <div class="loader-geometric"></div>
            <div class="loader-text">TAO-ZI-JIAO</div>
            <div class="loader-subtext">系統載入中...</div>
        </div>
    </div>

    <nav class="shape-navbar">
        <div class="logo-container">
            <img src="./page_picture/logo.png" alt="Logo" class="site-logo">
        </div>
       
        <ul class="nav-links" id="navLinksMenu">
            <div class="nav-indicator" id="navIndicator"></div>
            <li><a href="index.html">首頁</a></li>
            <li><a href="tour.html">建築密碼</a></li>
            <li><a href="about.html">關於我們</a></li>
            <li><a href="login.html" class="active">管理登入</a></li>
        </ul>

        <div class="right-controls">
            <div class="lang-selector">
                <span class="lang-icon">🌐</span>
                <span class="lang-text">zh-TW</span>
                <span class="lang-arrow">▼</span>
            </div>
            <button id="menuBurger" class="burger-btn" style="display:none;">☰</button>
        </div>
    </nav>

    <div id="mobileSideMenu" class="mobile-side-menu">
        <button id="closeMenu" class="close-menu-btn">✕</button>
        <ul class="side-menu-links">
            <li><a href="index.html">首頁</a></li>
            <li><a href="tour.html">建築密碼</a></li>
            <li><a href="about.html">關於我們</a></li>
            <li><a href="login.html" style="color: #b71c1c;">管理登入</a></li>
        </ul>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo-area">
                <img src="./page_picture/only_logo.png" alt="桃子腳Logo">
                <span class="login-title-main">桃子腳地圖</span>
            </div>
            <div class="login-title-sub">管理系統登入</div>
            <input type="text" id="username" placeholder="請輸入管理員帳號">
            <input type="password" id="password" placeholder="請輸入管理員密碼">
            <button onclick="performLogin()">登入系統</button>
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000'
            : '';

        async function performLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
        const res = await fetch(`${API_BASE}/api/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: u, password: p })
        });
            const data = await res.json();
            
            if(data.success) {
                localStorage.setItem('staff_token', data.token);
                localStorage.setItem('staff_username', data.username || u);
                localStorage.setItem('staff_role', data.role || 'editor');
                window.location.href = 'Work_blades.html';
            } else {
                alert('帳號或密碼錯誤！');
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.body.classList.add('page-ready');
            const indicator = document.getElementById('navIndicator');
            const activeLink = document.querySelector('.nav-links a.active') || document.querySelector(`.nav-links a[href="${window.location.pathname.split('/').pop()}"]`);
            const navTransition = 'all 0.4s cubic-bezier(0.25, 1, 0.5, 1)';

            if (indicator && activeLink) {
                const activeItem = activeLink.parentElement || activeLink;
                indicator.style.transition = 'none';
                indicator.style.width = `${activeItem.offsetWidth}px`;
                indicator.style.left = `${activeItem.offsetLeft}px`;
                requestAnimationFrame(() => {
                    indicator.style.transition = navTransition;
                });
            }
           
            setTimeout(() => {
                const ls = document.getElementById('loading-screen');
                if (ls) {
                    ls.style.opacity = '0';
                    setTimeout(() => { ls.style.display = 'none'; }, 600);
                }
            }, 100);

            document.querySelectorAll('.nav-links a').forEach(link => {
                link.addEventListener('click', function(e) {
                    const dest = this.getAttribute('href');
                    if (dest && dest !== '#') {
                        e.preventDefault();
                        const parentLi = this.parentElement || this;
                        if (indicator) {
                            indicator.style.width = `${parentLi.offsetWidth}px`;
                            indicator.style.left = `${parentLi.offsetLeft}px`;
                        }
                        document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
                        this.classList.add('active');
                        
                        setTimeout(() => {
                            window.location.href = dest;
                        }, 150);
                    }
                });
            });

            // 漢堡選單功能
            const burger = document.getElementById('menuBurger');
            const closeMenu = document.getElementById('closeMenu');
            const sideMenu = document.getElementById('mobileSideMenu');
            if (burger && sideMenu) {
                burger.addEventListener('click', () => sideMenu.classList.add('open'));
            }
            if (closeMenu && sideMenu) {
                closeMenu.addEventListener('click', () => sideMenu.classList.remove('open'));
            }
        });
    </script>
</body>
</html>
